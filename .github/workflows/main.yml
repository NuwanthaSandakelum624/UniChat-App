name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev autotools-dev

      - name: Install LATEST Python Dependencies
        run: pip install --user --upgrade buildozer cython virtualenv

      - name: Auto-Generate Perfect buildozer.spec
        run: |
          cat <<EOF > buildozer.spec
          [app]
          title = UniChat
          package.name = unichat
          package.domain = org.unichat
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,mp4
          version = 0.1
          requirements = python3,kivy,kivymd,requests,plyer,pillow
          android.permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE
          orientation = portrait
          fullscreen = 0

          [buildozer]
          log_level = 2

          [android]
          android.archs = arm64-v8a
          android.ndk = 25b
          android.accept_sdk_license = True
          android.api = 34
          android.minapi = 21
          EOF

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin/
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UniChat-APK
          path: bin/*.apk
