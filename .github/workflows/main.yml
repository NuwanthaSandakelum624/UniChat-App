name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: kivymd/buildozer-action@main
        with:
          buildozer_version: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
