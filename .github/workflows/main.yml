name: Build Kivy APK

on:
  push:
    branches:
      - main  # ඔබගේ ප්‍රධාන ශාඛාවේ නම මෙහි දමන්න (සාමාන්‍යයෙන් main හෝ master)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_version: latest
        env:
          # Android SDK බලපත්‍රය ස්වයංක්‍රීයව පිළිගැනීමට
          ANDROID_SDK_HOME: /home/runner/.buildozer/android/platform/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UniChat_APK
          path: bin/*.apk
