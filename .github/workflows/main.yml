name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: kivy/buildozer-action@master
        with:
          buildozer_version: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
