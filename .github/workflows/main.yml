name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: pip install --upgrade buildozer

      - name: Build APK
        run: buildozer android debug
        # ඔයාගේ buildozer.spec ෆයිල් එක ප්‍රධාන තැනම තියෙනවා නම් මෙතන වෙනසක් කරන්න එපා.

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UniChat-APK
          path: bin/*.apk
