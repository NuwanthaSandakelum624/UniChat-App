name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build with Buildozer
        uses: pjep/buildozer-action@master
        with:
          buildozer_version: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
